services:
  db:
    image: mysql:8.4
    env_file:
      - .env
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  migrate:
    build:
      context: .
      target: migrator
    env_file:
      - .env
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT}:3000"
    volumes:
      - uploads_data:/app/private-uploads

volumes:
  mysql_data:
  uploads_data:
